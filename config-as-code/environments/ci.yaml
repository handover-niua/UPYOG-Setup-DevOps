global:
  domain: cicd.cicd.great-site.net  ## Add your Domain Name Eg: site.mydomain.com
  setup: fullsetup
  
cluster-configs:
  namespaces:
    create: true
    values: [ jenkins, cert-manager ]
  root-ingress:
    namespace: jenkins
    serviceName: jenkins
    servicePort: 8080
    appRoot: ""
    cert-issuer: "letsencrypt-prod"

jenkins:
  persistence:
    enabled: true
   # aws:
   #   - volumeId: "vol-0ca9605ab69093303" # Add volume id for jenkins-home
   #     zone: ap-south-1b # Add respective availability_zones 

  oauth:
    enabled: true
    acl:
      admin:
        - handover-niua*handover-team # Add github team. Members of this team gets admin access on jenkins
      user:                                 # Add github team. Members of this team gets login access on jenkins
        - handover-niua*handover-team-ci
        - handover-niua*handover-team-upyog-demo
        
        
       

  jobBuilder:    # Add jobBuilder repo's, add repo's ssh link
    repos: >-
      'https://github.com/handover-niua/UPYOG.git'
  deploymentJobs:  # Setup deploymentJobs ACL 
    - name: ci    # deployment job name
      acl: [handover-niua*handover-team-ci] # GitHub team name, Members of the team get access to deployment job
    - name: upyog-demo
      acl: [handover-niua*handover-team-upyog-demo] 
    
       
  master:
    ingress:
      enabled: true
    resources:
      limits:
        cpu: "2000m"
        memory: "4096Mi"
    javaOpts: "-Xms2560M -Xmx2560M -Duser.timezone=Asia/Calcutta"

nginx-ingress:
  replicas: 1
  default-backend-service: "jenkins/jenkins"
  namespace: jenkins
  cert-issuer: "letsencrypt-staging"
  ssl-protocols: "TLSv1.2 TLSv1.3"
  ssl-ciphers: "EECDH+CHACHA20:EECDH+AES"
  ssl-ecdh-curve: "X25519:prime256v1:secp521r1:secp384r1"
  controller:
    image:
      repository: egovio/nginx-ingress-controller
      tag: "0.26.1"

cert-manager:
  namespace: jenkins
  clusterIssuer:
    stage:
      acme:
        email: "cdg-contact@niua.org"     # Add mail id

cluster-autoscaler:
  namespace: jenkins
  cloudProvider: aws  
  awsRegion: ap-south-1
  autoDiscovery:
    clusterName: egov-cicd # Add cluster name
    tags:
    - kubernetes.io/cluster/egov-cicd # Add cluster name
